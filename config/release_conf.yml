project:
  name: svg-bbox
  description: A set of tools to compute and to use a SVG boundin
  ecosystem: node
version:
  file: package.json
  field: version
  tag_prefix: v
tools:
  package_manager: pnpm
  node_version: '24'
git:
  main_branch: main
  remote: origin
github:
  owner: Emasoft
  repo: SVG-BBOX
  release_target: commit_sha
quality_checks:
  lint:
    enabled: true
    command: pnpm run lint
    auto_fix_command: pnpm run lint:fix
  typecheck:
    enabled: true
    command: pnpm run typecheck
  tests:
    # Locally disabled for the v1.2.1 release: residual Chromium contention
    # flake under selective-test ordering causes a non-deterministic 1-2
    # test failures per local run, even after the tab-leak fix that brought
    # the failure rate from ~5% to ~0.15%. CI on GitHub Actions runs the
    # SAME test suite in a single-node container with no shared-Chromium
    # contention, so it is the authoritative gate. Local skip just avoids
    # double-running the same flaky tests on a worse environment.
    # Re-enable once the residual race in the bbox sampler is fully fixed.
    enabled: false
    mode: selective
    full_command: pnpm test
    selective_command: node scripts/test-selective.cjs
  e2e:
    enabled: true
    command: pnpm run test:e2e
  build:
    enabled: true
    command: pnpm run build
    output_files: []
ci:
  platforms: github
  workflow:
    name: CI
    timeout_seconds: 900
    poll_interval_seconds: 10
  publish:
    name: Publish to npm
    timeout_seconds: 900
    poll_interval_seconds: 10
npm:
  registry: https://registry.npmjs.org
  access: public
  publish_method: oidc
release_notes:
  generator: git-cliff
  config_file: cliff.toml
timeouts:
  git_operations: 30
  npm_operations: 60
  test_execution: 600
  ci_workflow: 900
  publish_workflow: 900
  npm_propagation: 300
safety:
  require_clean_worktree: true
  require_main_branch: true
  require_ci_pass: true
  auto_rollback_on_failure: true
  confirm_before_push: false
publishers:
  - npm
  - homebrew
  - github
